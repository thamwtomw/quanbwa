<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Link Extractor</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 20px auto; padding: 0 20px; }
        textarea { width: 100%; height: 200px; margin-bottom: 10px; display: block; border: 1px solid #ccc; border-radius: 4px; }
        #output { background: #f9f9f9; padding: 15px; border-radius: 4px; border: 1px solid #ddd; min-height: 50px; line-height: 1.6; }
        .link-item { margin-bottom: 5px; display: block; word-break: break-all; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #218838; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h2>Path to Link Converter</h2>
    <textarea id="input" placeholder="Paste log text here..."></textarea>
    <button onclick="generateLinks()">Generate Links</button>

    <h3>Generated Links:</h3>
    <div id="output"></div>

    <script>
        function generateLinks() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('output');
            const prefix = "";
            
            // Regex captures text between "─ Warnings for " and the final ":"
            const regex = /─ Warnings for (.*):/g;
            let htmlResults = "";
            let match;

            while ((match = regex.exec(input)) !== null) {
                const path = match[1].trim();
                const fullUrl = prefix + path;
                htmlResults += `<a class="link-item" href="${fullUrl}" target="_blank">${fullUrl}</a>`;
            }

            output.innerHTML = htmlResults || "No paths found.";
        }
    </script>

<div class="footer"></div></body>
</html>
